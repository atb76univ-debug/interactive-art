<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <title>Forest Color Drops - MediaPipe Pose Art</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="stage" id="stage">
      <canvas id="artCanvas" aria-label="interactive art canvas"></canvas>
      <video id="cameraVideo" class="camera-preview" playsinline muted></video>
      <canvas id="debugCanvas" class="debug-canvas" aria-label="pose skeleton overlay"></canvas>

      <section class="hud" aria-label="controls">
        <div class="controls">
          <button id="startCameraBtn" type="button">Start Camera</button>
          <button id="stopCameraBtn" type="button">Stop Camera</button>
          <button id="showCameraBtn" type="button">Show Camera</button>
          <button id="hideCameraBtn" type="button">Hide Camera</button>
          <button id="showSkeletonBtn" type="button">Show Skeleton</button>
          <button id="hideSkeletonBtn" type="button">Hide Skeleton</button>
          <button id="fullscreenBtn" type="button">Fullscreen</button>
          <button id="debugBtn" type="button">Debug OFF</button>
        </div>
        <div class="status" aria-live="polite">
          <span>FPS <strong id="fpsText">0</strong></span>
          <span>People <strong id="peopleText">0</strong></span>
        </div>
      </section>

      <div class="loading" id="loadingPanel">
        <strong>Loading PoseLandmarker</strong>
        <span>初回のみモデルを読み込みます</span>
      </div>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
